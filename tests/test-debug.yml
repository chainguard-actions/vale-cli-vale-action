name: Test Vale debug mode
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vale config and docs
        run: |
          # $GITHUB_WORKSPACE is the action dir root (pristine/vale-cli--vale-action/v2.0.0)
          # Copy the minimal vale config to workspace root
          cp "$GITHUB_WORKSPACE/tests/fixtures/vale-config/.vale.ini" "$GITHUB_WORKSPACE/.vale.ini"
          mkdir -p "$GITHUB_WORKSPACE/styles"
          mkdir -p "$GITHUB_WORKSPACE/docs"
          cp "$GITHUB_WORKSPACE/tests/fixtures/docs/sample.md" "$GITHUB_WORKSPACE/docs/sample.md"
          echo "Setup complete"
          cat "$GITHUB_WORKSPACE/.vale.ini"

      - name: Verify setup
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/.vale.ini" ]; then
            echo "FAIL: .vale.ini not found"
            exit 1
          fi
          echo "PASS: workspace ready"

      - id: vale-debug
        uses: .
        with:
          version: "latest"
          files: "docs"
          debug: "true"
          fail_on_error: "false"
          reporter: "github-check"
          level: "error"
          filter_mode: "nofilter"
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Assert debug action ran
        run: |
          echo "Vale action with debug=true completed"
          echo "PASS: debug mode action executed"

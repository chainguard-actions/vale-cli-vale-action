name: Test basic Vale usage
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vale config and docs
        run: |
          # $GITHUB_WORKSPACE is the action dir root (pristine/vale-cli--vale-action/v2.0.0)
          # Copy the minimal vale config to workspace root so Vale finds it
          cp "$GITHUB_WORKSPACE/tests/fixtures/vale-config/.vale.ini" "$GITHUB_WORKSPACE/.vale.ini"
          # Create a styles directory
          mkdir -p "$GITHUB_WORKSPACE/styles"
          # Copy sample docs to a docs subdirectory
          mkdir -p "$GITHUB_WORKSPACE/docs"
          cp "$GITHUB_WORKSPACE/tests/fixtures/docs/sample.md" "$GITHUB_WORKSPACE/docs/sample.md"
          echo "Setup complete"
          cat "$GITHUB_WORKSPACE/.vale.ini"

      - name: Verify .vale.ini is in place
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/.vale.ini" ]; then
            echo "FAIL: .vale.ini not found in workspace"
            exit 1
          fi
          echo "PASS: .vale.ini found"

      - id: vale
        uses: .
        with:
          version: "latest"
          files: "docs"
          fail_on_error: "false"
          reporter: "github-check"
          level: "error"
          filter_mode: "nofilter"
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Assert action ran
        run: |
          echo "Vale action completed (exit may be non-zero due to reviewdog in act environment)"
          echo "PASS: action executed without crashing the workflow"
